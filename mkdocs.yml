site_name: Forecasting - Notes
site_url: https://aurafrizzati.github.io/forecasting/
repo_url: https://github.com/AuraFrizzati/forecasting
docs_dir: doc
edit_uri: edit/main/doc/
extra_css:
  - stylesheets/extra.css
theme:
  name: material
  palette:
    scheme: custom
  features:
    - navigation.tabs
    - navigation.footer
    - content.action.edit
    - content.action.view
    - content.code.copy
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      check_paths: true
plugins:
  - search
  - table-reader
  - awesome-nav