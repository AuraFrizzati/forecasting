site_name: Forecasting - Notes
site_url: https://aurafrizzati.github.io/forecasting/
repo_url: https://github.com/AuraFrizzati/forecasting
docs_dir: doc
edit_uri: edit/main/doc/
extra_css:
  - stylesheets/extra.css
theme:
  name: material
  custom_dir: doc/overrides
  logo: assets/logo.png
  favicon: assets/favicon.ico
  palette:
    scheme: custom
  features:
    - navigation.tabs
    - navigation.footer
    - content.action.edit
    - content.action.view
    - content.code.copy
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      check_paths: true
plugins:
  - search
  - table-reader
  - awesome-nav

nav:
  - Home: index.md
  - Section 1:
      - subsection 1: datasets.md
      - Analytics & Forecasting: analytics.md
      - Data Quality: data-quality.md
  - Platform & Infrastructure:
      - Infrastructure & Platform: infrastructure.md
      - Environments: environments.md
      - Data Pipeline Tools: pipelines.md
      - Operations & Observability: operations.md
  - Processes & Workflows:
      - Development Process: development-process.md
      - Change Management: change-management.md
      - Agile Process: agile-process.md
      - Data Recovery: data-recovery.md
  - Access & Collaboration:
      - Access & Authentication: access.md
      - Sharing Views: sharing-views.md
      - Issue Logging: issue-logging.md
  - Reference:
      - Templates & Documentation: templates.md
      - Ways of Working: ways-of-working.md
      - Known Issues & Troubleshooting: known-issues.md